name: CI
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
jobs:
  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - run: terraform fmt -check -recursive
      - run: terraform init -backend=false
      - run: terraform validate
      - name: Require S3 bucket resource
        run: grep -q "aws_s3_bucket" main.tf || (echo "Add aws_s3_bucket to main.tf" && exit 1)
